name: Backend Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  phpstan:
    name: PHPStan (modern src scope)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: mbstring, pdo_sqlite, sqlite3, dom

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # Static analysis intentionally stays aligned to modern src/** scope via phpstan.neon.
      - name: Run PHPStan
        run: composer run phpstan

  tests:
    name: Modern default test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: mbstring, pdo_sqlite, sqlite3, dom

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # Create an empty .env so Laravel's Dotenv::safeLoad() does not emit
      # file_get_contents warnings. All test configuration lives in phpunit.xml
      # with force="true" — this file intentionally carries no values.
      - name: Provide empty .env for Dotenv bootstrap
        run: touch .env

      - name: Verify explicit legacy inventory before running defaults
        run: composer run test:verify-legacy

      # Default backend validation must keep Architecture coverage while excluding only
      # explicitly marked legacy tests, even though Laravel bootstrap still touches App\* transitively.
      - name: Run modern default backend suite
        run: composer test

# ─── DEPLOY PIPELINE NOTE (T-28) ──────────────────────────────────────────────
#
# No dedicated deploy pipeline exists yet. When one is created, ensure that
# `php artisan rbac:reconcile` runs in the following order:
#
#   1. php artisan migrate
#   2. php artisan rbac:reconcile   ← REQUIRED: creates any new permissions in DB
#                                     and assigns them to developer/backoffice roles
#   3. Reload web server (php-fpm restart / Octane reload)
#
# ORDERING IS CRITICAL: the admin route group uses `permission:manage_roles_and_permissions`
# middleware. If the web server reloads before rbac:reconcile runs, the permission
# will not exist in the DB and ALL admin routes will return 403.
#
# Run after every deploy that changes DomainPermissions::all().
# ──────────────────────────────────────────────────────────────────────────────
